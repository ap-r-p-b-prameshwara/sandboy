server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service-prod
          predicates:
            - Path=/api/login,/api/register
          filters:
            - StripPrefix=0
        
        - id: user-service
          uri: lb://user-service-prod
          predicates:
            - Path=/api/profile,/api/privileges
          filters:
            - TokenVerificationFilter
            - StripPrefix=0
        
        - id: qris-service
          uri: lb://qris-service-prod
          predicates:
            - Path=/api/qris/**
          filters:
            - TokenVerificationFilter
            - StripPrefix=0
        
        - id: cashin-service
          uri: lb://cashin-service-prod
          predicates:
            - Path=/api/cashin/**
          filters:
            - TokenVerificationFilter
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

auth:
  service:
    url: http://auth-service-prod:8083

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
