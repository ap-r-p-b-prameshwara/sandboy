server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service-prod:8081
          predicates:
            - Path=/api/register
          filters:
            - StripPrefix=0
        
        - id: user-service-profile
          uri: http://user-service-prod:8081
          predicates:
            - Path=/api/profile
          filters:
            - TokenVerificationFilter
            - StripPrefix=0
        
        - id: user-service-privileges
          uri: http://user-service-prod:8081
          predicates:
            - Path=/api/privileges
          filters:
            - TokenVerificationFilter
            - StripPrefix=0
        
        - id: auth-login
          uri: http://auth-service-prod:8083
          predicates:
            - Path=/api/login
          filters:
            - StripPrefix=0
        
        - id: auth-verify
          uri: http://auth-service-prod:8083
          predicates:
            - Path=/api/verify
          filters:
            - StripPrefix=0
        
        - id: qris-service
          uri: http://qris-service-prod:8086
          predicates:
            - Path=/api/qris/**
          filters:
            - TokenVerificationFilter
            - StripPrefix=0
        
        - id: cashin-service
          uri: http://cashin-service-prod:8088
          predicates:
            - Path=/api/cashin/**
          filters:
            - TokenVerificationFilter
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

auth:
  service:
    url: http://auth-service-prod:8083

gateway:
  environment: production

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
