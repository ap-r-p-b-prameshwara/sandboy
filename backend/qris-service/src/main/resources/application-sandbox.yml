server:
  port: 8087

spring:
  application:
    name: qris-service
  
  datasource:
    url: jdbc:postgresql://localhost:5433/sandbox_db
    username: ${POSTGRES_USER:sandbox_user}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: qris_merchants
        dialect: org.hibernate.dialect.PostgreSQLDialect

qris:
  dummy:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.sandbox: DEBUG
