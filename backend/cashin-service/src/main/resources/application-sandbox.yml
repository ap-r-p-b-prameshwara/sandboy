server:
  port: 8089

spring:
  application:
    name: cashin-service
  
  datasource:
    url: jdbc:postgresql://localhost:5433/sandbox_db
    username: ${POSTGRES_USER:sandbox_user}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: virtual_accounts
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.sandbox: DEBUG
