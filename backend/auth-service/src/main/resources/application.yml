server:
  port: 8083

spring:
  application:
    name: auth-service
  
  profiles:
    active: prod
  
  datasource:
    url: jdbc:postgresql://localhost:5432/sandbox_prod
    username: ${POSTGRES_USER:sandbox_user}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: credentials
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  environment: production

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.sandbox: DEBUG
