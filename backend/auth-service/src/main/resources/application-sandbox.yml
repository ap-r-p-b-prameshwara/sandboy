server:
  port: 8084

spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:postgresql://localhost:5433/sandbox_db
    username: ${POSTGRES_USER:sandbox_user}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: credentials
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  environment: sandbox

# Sandbox auth service verifies production tokens
auth:
  service:
    prod:
      url: ${AUTH_SERVICE_PROD_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.sandbox: DEBUG
